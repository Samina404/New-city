<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | New City Point</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/WhatsApp Image 2026-04-02 at 8.03.30 AM 1.png">

    <style>
        body {
            background-color: #fcfbf7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .auth-card {
            background: white;
            padding: 50px 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            max-width: 480px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .auth-logo-circle {
            width: 70px;
            height: 70px;
            background: #fdfaf3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
        }

        .auth-logo-circle img {
            width: 35px;
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 38px;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .auth-subtitle {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 10px;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            cursor: pointer;
        }

        .form-control {
            padding: 12px 15px 12px 45px;
            border: 1px solid #eee;
            border-radius: 4px;
            background: #fafafa;
            font-size: 14px;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--secondary-color);
            background: white;
        }

        .btn-auth {
            background: var(--primary-color);
            color: white;
            width: 100%;
            padding: 15px;
            border-radius: 4px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            margin-top: 10px;
            transition: .3s;
        }

        .btn-auth:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .auth-sep {
            margin: 30px 0;
            position: relative;
            text-align: center;
        }

        .auth-sep::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #eee;
            z-index: 1;
        }

        .auth-sep span {
            background: white;
            padding: 0 15px;
            position: relative;
            z-index: 2;
            color: #999;
            font-size: 12px;
        }

        .auth-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link:hover {
            color: var(--secondary-color);
        }

        .guest-link {
            display: block;
            margin-top: 25px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
        }

        .guest-link:hover {
            color: var(--primary-color);
        }
    </style>
</head>

<body>

    <div class="announcement-bar">
        <div class="container announcement-content">
            <span>?</span>
            <span>NEW COLLECTION 2026</span>
            <span>?</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-3" href="index.html">
                <img src="assets/images/WhatsApp Image 2026-04-02 at 8.03.30 AM 1.png" alt="Logo">
                <div class="d-none d-sm-block">
                    <div
                        style="font-family: var(--font-heading); font-size: 24px; line-height: 1; letter-spacing: 0.05em; color: var(--primary-color); font-weight: 500;">
                        New City Point</div>
                    <div
                        style="font-family: var(--font-body); font-size: 12px; opacity: 1; letter-spacing: 0.1em; font-weight: 400; color: var(--secondary-color); margin-top: 4px;">
                        GENUINE • PREMIUM • EXCLUSIVE</div>
                </div>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <i class="bi bi-list fs-2 text-primary"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">SHOP</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">ABOUT</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">CONTACT</a></li>
                </ul>
            </div>
            <div class="d-flex align-items-center gap-3 nav-icons-group">
                <a href="javascript:void(0)" id="search-trigger" class="text-primary transition-smooth">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                </a>
                <a href="cart.html" class="text-primary transition-smooth position-relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                        <path d="M3 6h18" />
                        <path d="M16 10a4 4 0 0 1-8 0" />
                    </svg>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-gold"
                        style="font-size: 10px; padding: 2px 5px; min-width: 18px;">0</span>
                </a>
                <a href="javascript:handleProfileClick()" class="text-primary transition-smooth">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </a>
            </div>
        </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo-circle">
                <img src="assets/images/WhatsApp Image 2026-04-02 at 8.03.30 AM 1.png" alt="Crown">
            </div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to continue your luxury shopping experience</p>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Address *</label>
                    <div class="input-wrapper">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="form-control" placeholder="Enter your email" required name="email">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password *</label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-control" placeholder="Enter your password" required
                            name="password" id="password-input">
                        <i class="bi bi-eye eye-icon" onclick="togglePassword()"></i>
                    </div>
                </div>
                <button type="submit" class="btn-auth">Login to Your Account <i class="bi bi-arrow-right"></i></button>
            </form>

            <div class="auth-sep"><span>or</span></div>

            <p style="font-size: 14px; color: #666;">Don't have an account? <a href="register.html"
                    class="auth-link">Create one</a></p>

            <a href="shop.html" class="guest-link">Continue as Guest</a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="copyright-section border-0 pt-0">
                <p class="mb-0">© 2026 New City Point. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        $(document).ready(function () {
            $('#login-form').on('submit', function (e) {
                e.preventDefault();
                const email = $('input[name="email"]').val();
                const password = $('input[name="password"]').val();

                const result = loginUser(email, password);
                if (result.success) {
                    // Check if we came from cart
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('redirect') === 'checkout') {
                        location.href = 'checkout.html';
                    } else {
                        location.href = 'my-orders.html';
                    }
                } else {
                    alert(result.message);
                }
            });
        });
    </script>
</body>

</html>
